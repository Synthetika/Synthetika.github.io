<header class="site-header" role="banner">
  <div class="wrapper">
    <!-- Glitchy site title -->
    <a class="site-title glitch" href="{{ "/" | relative_url }}" data-text="{{ site.title }}">
      {{ site.title }}
    </a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18" height="15" aria-hidden="true">
            <path d="M18,1.5A1.5,1.5,0,0,1,16.5,3H1.5A1.5,1.5,0,0,1,0,1.5,1.5,1.5,0,0,1,1.5,0h15A1.5,1.5,0,0,1,18,1.5ZM18,7.5A1.5,1.5,0,0,1,16.5,9H1.5A1.5,1.5,0,0,1,0,7.5,1.5,1.5,0,0,1,1.5,6h15A1.5,1.5,0,0,1,18,7.5ZM18,13.5A1.5,1.5,0,0,1,16.5,15H1.5A1.5,1.5,0,0,1,0,13.5,1.5,1.5,0,0,1,1.5,12h15A1.5,1.5,0,0,1,18,13.5Z"/>
          </svg>
        </span>
      </label>
      <div class="trigger">
        {% for p in site.pages %}
          {% if p.title %}
            <a class="page-link" href="{{ p.url | relative_url }}">{{ p.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
